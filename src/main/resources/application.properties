spring.application.name=rmms-backend

# Optional local-only overrides (real DB / admin passwords for running on
# localhost). This file is git-ignored and never committed. Missing in prod =
# no error, thanks to "optional:". See application-local.properties.
spring.config.import=optional:file:./application-local.properties

# -----------------------------
# Database Connection
# -----------------------------
# Real credentials must NOT be committed. Provide them at runtime via an
# external config, e.g. --spring.config.location=file:/opt/klrams/config/application.properties
spring.datasource.url=jdbc:postgresql://localhost:5432/rmms
spring.datasource.username=rmms_user
spring.datasource.password=${DB_PASSWORD:CHANGE_ME}

# -----------------------------
# Server
# -----------------------------
server.port=8090

# -----------------------------
# Session cookie hardening (CSRF defence)
# -----------------------------
# SameSite=Strict stops the browser from attaching the session cookie to ANY
# cross-site request, so a malicious page cannot make an authenticated staff
# browser fire state-changing calls (classic CSRF) — including the few mutating
# endpoints reachable via GET (e.g. /api/climate/seed-grid). This replaces the
# token-based CSRF that is disabled in SecurityConfig for the static frontend.
# http-only keeps the cookie unreadable to JavaScript (defends against XSS theft).
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.http-only=true

# -----------------------------
# File Upload Limits
# -----------------------------
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB
server.tomcat.max-swallow-size=-1

# -----------------------------
# Storage Directories
# -----------------------------
app.video-dir=/opt/klrams/data/videos
app.shapefile-dir=/opt/klrams/data/shapefiles
app.excel-dir=/opt/klrams/data/excel
app.image-dir=/opt/klrams/data/images
app.report-dir=/opt/klrams/data/reports
app.temp-dir=/opt/klrams/data/temp

# -----------------------------
# KLRAMS Admin Login (bootstrap super-admin — set the real password in
# external config, never here). Used only to seed the first account.
# -----------------------------
app.admin.username=admin
app.admin.password=${ADMIN_PASSWORD:}

# -----------------------------
# HTTP Compression (gzip) — shrinks GeoJSON ~5-10x over the wire
# NOTE: browsers/Spring label JS as "text/javascript", so it MUST be listed
# explicitly or every .js module ships uncompressed (~4x larger).
# -----------------------------
server.compression.enabled=true
server.compression.mime-types=application/json,application/geo+json,text/plain,text/css,application/javascript,text/javascript,image/svg+xml
server.compression.min-response-size=1024

# -----------------------------
# Static asset caching — every JS/CSS include is cache-busted with ?v=NNN
# (see map.html), so it is safe to cache aggressively. Without this, Spring
# Security stamps "no-store" on assets and the browser re-downloads all ~30
# JS modules + CSS on every page load and every navigation. The matching
# WebSecurityCustomizer in SecurityConfig lets these headers survive.
# -----------------------------
spring.web.resources.cache.cachecontrol.max-age=30d
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.cache.use-last-modified=true
