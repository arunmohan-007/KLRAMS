<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KLRAMS Console · Change password — Kerala PWD</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0b1220; --panel:#101b2e; --panel-2:#0e1726; --edge:#20304c; --edge-soft:#1a2740;
    --text:#eaf0fa; --muted:#93a3bb; --muted-2:#5f6e86; --green:#19b277; --amber:#ffa630; --red:#e65b5b;
    --disp:'Space Grotesk',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:var(--body);background:var(--void);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;padding:20px}
  .bg{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(90% 60% at 82% -10%, rgba(25,178,119,.14) 0, transparent 60%),
      radial-gradient(70% 50% at 8% 108%, rgba(59,134,230,.12) 0, transparent 60%), var(--void)}
  .card{position:relative;z-index:2;width:100%;max-width:420px;background:linear-gradient(165deg,var(--panel),var(--panel-2));border:1px solid var(--edge-soft);border-radius:16px;padding:30px 28px 26px}
  .glyph{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#19b277,#0d7a51);display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:16px}
  .glyph svg{width:24px;height:24px}
  h1{font-family:var(--disp);font-weight:700;font-size:23px;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13px;line-height:1.55;margin:8px 0 20px}
  label{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:15px 0 6px}
  input{width:100%;padding:11px 13px;border:1px solid var(--edge);border-radius:9px;font-size:14px;font-family:var(--mono);color:var(--text);background:rgba(6,11,20,.55);transition:.18s}
  input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(25,178,119,.15)}
  .btn{width:100%;margin-top:22px;padding:12px;border:0;border-radius:10px;cursor:pointer;font-family:var(--disp);font-weight:600;font-size:14px;color:#08130d;background:linear-gradient(180deg,#37cf93,#19b277)}
  .btn:hover{filter:brightness(1.05)} .btn:active{transform:translateY(1px)}
  .msg{margin-top:14px;font-size:12.5px;padding:9px 12px;border-radius:9px;display:none}
  .msg.err{display:block;color:#ffb4ac;background:rgba(230,91,91,.1);border:1px solid rgba(230,91,91,.32)}
  .msg.ok{display:block;color:#a4ecc7;background:rgba(25,178,119,.1);border:1px solid rgba(25,178,119,.32)}
  .foot{margin-top:18px;text-align:center}
  .foot a{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);text-decoration:none}
  .foot a:hover{color:var(--amber)}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="card">
    <div class="glyph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div>
    <h1>Change your password</h1>
    <p class="sub" id="sub">For your security, please set a new password before continuing.</p>
    <form id="form" autocomplete="off">
      <label for="current">Current password</label>
      <input id="current" type="password" autocomplete="current-password" required placeholder="••••••••">
      <label for="next">New password</label>
      <input id="next" type="password" autocomplete="new-password" required placeholder="min 6 characters">
      <label for="confirm">Confirm new password</label>
      <input id="confirm" type="password" autocomplete="new-password" required placeholder="repeat new password">
      <button class="btn" type="submit">Update password</button>
      <div class="msg" id="msg"></div>
    </form>
    <div class="foot"><a href="/logout">Sign out instead</a></div>
  </div>

  <script>
  (function(){
    var form=document.getElementById('form'), msg=document.getElementById('msg'), sub=document.getElementById('sub');
    // If the user isn't being forced, soften the copy.
    fetch('/api/me',{credentials:'same-origin'}).then(function(r){return r.ok?r.json():null;}).then(function(me){
      if(me && me.authenticated && !me.mustChangePassword)
        sub.textContent='Update the password for '+(me.username||'your account')+'.';
    }).catch(function(){});

    function show(ok,text){ msg.className='msg '+(ok?'ok':'err'); msg.textContent=text; }

    form.addEventListener('submit', function(e){
      e.preventDefault();
      var cur=document.getElementById('current').value;
      var next=document.getElementById('next').value;
      var conf=document.getElementById('confirm').value;
      if(next.length<6){ show(false,'New password must be at least 6 characters.'); return; }
      if(next!==conf){ show(false,'The new passwords do not match.'); return; }
      fetch('/api/account/password',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({current:cur,new:next})})
        .then(function(r){ return r.json().then(function(d){ return {ok:r.ok,d:d}; }); })
        .then(function(res){
          if(res.ok && res.d.ok){ show(true,'Password updated. Redirecting…'); setTimeout(function(){ location.href='/home.html'; }, 900); }
          else show(false, res.d.error || 'Could not update password.');
        })
        .catch(function(){ show(false,'Network error.'); });
    });
  })();
  </script>
</body>
</html>
